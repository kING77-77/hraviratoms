<section id="countdown" class="countdown-section">
    <div class="glass-panel text-center fade-in">
        <h3 class="elegant-subtitle">Մինչև հարսանիքը մնացել է</h3>
        <p class="subtitle mb-4">До нашей свадьбы осталось</p>
        
        <div class="timer-container">
            <div class="timer-item">
                <span class="timer-value">{{format(days)}}</span>
                <span class="timer-label">Օր</span>
            </div>
            <div class="timer-divider">:</div>
            <div class="timer-item">
                <span class="timer-value">{{format(hours)}}</span>
                <span class="timer-label">ժամ</span>
            </div>
            <div class="timer-divider">:</div>
            <div class="timer-item">
                <span class="timer-value">{{format(minutes)}}</span>
                <span class="timer-label">րոպե</span>
            </div>
            <div class="timer-divider">:</div>
            <div class="timer-item">
                <span class="timer-value">{{format(seconds)}}</span>
                <span class="timer-label">վրկ</span>
            </div>
        </div>
    </div>
</section>
